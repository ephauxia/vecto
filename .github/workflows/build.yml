name: Build VECTO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache Tauri CLI
        id: cache-tauri-cli
        uses: actions/cache@v3
        with:
          path: ~/.cargo/bin/cargo-tauri.exe
          key: ${{ runner.os }}-tauri-cli-2.0

      - name: Install Tauri CLI
        if: steps.cache-tauri-cli.outputs.cache-hit != 'true'
        run: cargo install tauri-cli --version "^2.0.0"
        working-directory: src-tauri

      - name: Build app
        run: cargo tauri build --debug
        working-directory: src-tauri

      - name: Upload installer
        uses: actions/upload-artifact@v6
        with:
          name: VECTO-installer
          path: |
            src-tauri/target/release/debug/bundle/msi/*.msi
            src-tauri/target/release/debug/bundle/nsis/*.exe
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache Tauri CLI
        id: cache-tauri-cli-linux
        uses: actions/cache@v3
        with:
          path: ~/.cargo/bin/cargo-tauri
          key: ${{ runner.os }}-tauri-cli-2.0

      - name: Install Tauri CLI
        if: steps.cache-tauri-cli-linux.outputs.cache-hit != 'true'
        run: cargo install tauri-cli --version "^2.0.0"
        working-directory: src-tauri

      - name: Build app
        run: cargo tauri build
        working-directory: src-tauri

      - name: Upload installer
        uses: actions/upload-artifact@v6
        with:
          name: VECTO-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 30